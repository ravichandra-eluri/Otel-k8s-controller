apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-k8s-controller-manager-role
rules:
  - apiGroups: ["otel.chandradevgo.io"]
    resources: ["otelcollectors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["otel.chandradevgo.io"]
    resources: ["otelcollectors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["otel.chandradevgo.io"]
    resources: ["otelcollectors/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-k8s-controller-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-k8s-controller-manager-role
subjects:
  - kind: ServiceAccount
    name: default
    namespace: otel-system
